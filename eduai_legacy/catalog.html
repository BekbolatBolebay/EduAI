<!DOCTYPE html>
<html class="light" lang="kk">
<head>

    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>EduAI - Каталог</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#ffffff",
                    "primary": "#00458d",
                    "primary-container": "#005cb9",
                    "on-primary": "#ffffff",
                    "background": "#f7f9fb",
                    "on-background": "#191c1e",
                    "on-surface": "#191c1e",
                    "on-surface-variant": "#424752",
                    "surface-variant": "#e0e3e5",
                    "outline-variant": "#c2c6d4",
                    "secondary-container": "#00ccf9",
                    "on-secondary-container": "#005266",
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "h3": ["Plus Jakarta Sans"],
                    "h2": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "label-caps": ["Plus Jakarta Sans"]
            }
          },
        },
      }

    <style>

</head>

        </div>
        <div class="flex items-center gap-4">
            <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-blue-50/50 transition-colors">
                <span class="material-symbols-outlined text-[#005CB9]">notifications</span>
            </button>
            <a href="profile.html" class="w-8 h-8 rounded-full overflow-hidden border-2 border-primary block">

            <div class="relative max-w-2xl">

                            <h3 class="text-2xl font-bold mt-2 mb-3 font-h3">Болашақ инженерлері</h3>
                            <p class="text-on-surface-variant text-sm mb-6">Arduino платформасында алғашқы роботыңызды құрастыруды үйреніңіз.</p>
                        </div>
                        <button class="w-full py-4 bg-primary text-on-primary rounded-xl font-bold hover:shadow-lg transition-all">Курсқа жазылу</button>
                    </div>
                </div>
            </div>

            <!-- Small Card -->
            <div class="md:col-span-4 group bg-white rounded-[24px] p-6 shadow-sm border border-blue-50">
                <div class="w-full h-40 rounded-2xl mb-6 overflow-hidden">
                    <img alt="Coding" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAu27Eh6w5FNMTD-E0PVvsGJZKRYJGGuVOtR3cSoc5A5ZuFqcbud-jis_ofed3dYTIEupEAGKX06n5uMV6nxAZo3C_ipXy8hsWCa3RAyzpL6QdNcj8hfUzJ0TQBlsO6gXsk7uqfjdQMvKFZqZOVxqAaJ6Tx6sFnkDI5dPGm_qM9O1oo5_0nBkJ_v_C0G_pf2vdHsMcqgFEmgjyxjEd0cMls2CUmTYUTfyTcgOO86R3SpC9dXApcVQl8CEC7-eHwARq2A5FfM1NKSL6l"/>

                <h3 class="text-xl font-bold mt-2 mb-2">Python: Ойын жасау</h3>
                <p class="text-on-surface-variant text-sm">Pygame кітапханасы арқылы алғашқы 2D ойыныңызды жасаңыз.</p>

        <a class="flex flex-col items-center justify-center text-slate-400 hover:text-blue-500 transition-all active:scale-90" href="home.html">
            <span class="material-symbols-outlined">home</span>

        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 hover:text-blue-500 transition-all active:scale-90" href="tests.html">

        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 hover:text-blue-500 transition-all active:scale-90" href="chat.html">

        <a class="flex flex-col items-center justify-center text-slate-400 hover:text-blue-500 transition-all active:scale-90" href="profile.html">
            <span class="material-symbols-outlined">person</span>
            <span class="text-[10px] font-semibold mt-1">Мен</span>
        </a>
    </nav>

</html>
